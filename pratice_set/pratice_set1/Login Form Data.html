<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Longin form</title>
</head>
<style>
    body{
        background-image: url("download (1).jfif");
        background-size: cover;
        background-attachment: fixed;
        background-repeat: no-repeat;
        background-position: center;

        font-family: 'Times New Roman', Times, serif;
        color: oldlace;

        margin: 0;

        display: flex;
        flex-direction: column;
    }

    header{
        text-align: center;
        background-color: rgba(0, 0, 0, 0.6);
        color: white;
        padding:20px;
        margin: 0px;
        font-size: 30px;
    }
    nav{
        display: flex;
        justify-content: center;
        gap:20px;
        margin:20px;
    }
    .btn {
        text-decoration: none;
        color: white;
        padding: 10px 20px;
        border: 2px solid white;
        border-radius: 25px;
        transition: 0.3s;
        }

    .btn:hover {
        background-color: white;
        color: black;
        }
    section {
        flex: 1; 
        display: flex;
        justify-content: center;
        align-items: center;
    }
    form {
        background: rgba(0,0,0,0.6);
        padding: 30px;
        border-radius: 15px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        width: 300px;
    }
    input {
        padding: 8px;
        border-radius: 5px;
        border: none;
    }

    button {
        padding: 10px;
        border-radius: 10px;
        border: none;
        cursor: pointer;
    }

    button:hover {
        background-color: lightgray;
    }
    footer {
        text-align: center;
        background: rgba(0,0,0,0.6);
        padding: 10px;
    }
</style>
<body>
    <header>
        <h1>Login Form</h1>
    </header>
    <nav>
        <a href="Personal_Profile.html" class="btn">Home</a>
        <a href="Resume.html" class="btn">Resume</a>
        <a href="Login Form Data.html" class="btn">Login</a>
    </nav>
    <section>
        <form>
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required><br>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required><br>
            <button type="submit">signup</button>
            <button type="reset">resetpassword</button>
        </form>

    </section>
    <footer>
        <p>&copy; 2023 Your Name. All rights reserved.</p>
    </footer>
</body>
</html>
